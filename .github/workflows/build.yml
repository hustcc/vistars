name: build

on:
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm i

      - name: Run tests
        run: npm run test:run

      - name: Build library
        run: npm run build

      - name: Build site
        working-directory: ./site
        run: |
          npm i
          npm run build
